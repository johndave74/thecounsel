# Supabase local development configuration.
# Run `supabase start` to boot the local stack, then `supabase db reset`
# to apply migrations in supabase/migrations.
project_id = "the-counsel"

[api]
enabled = true
port = 54321
schemas = ["public", "graphql_public"]
extra_search_path = ["public", "extensions"]
max_rows = 1000

[db]
port = 54322
shadow_port = 54320
major_version = 15

[studio]
enabled = true
port = 54323

[inbucket]
enabled = true
port = 54324

[storage]
enabled = true
file_size_limit = "50MiB"

[auth]
enabled = true
site_url = "http://localhost:5173"
additional_redirect_urls = ["http://localhost:5173", "http://localhost:5173/auth/reset-password"]
jwt_expiry = 3600
enable_refresh_token_rotation = true
refresh_token_reuse_interval = 10
# NO public signup. Accounts are provisioned: the Platform Owner is created once
# in the Supabase dashboard (first user is auto-promoted), then every account is
# created in-app by an admin via the admin-create-user Edge Function.
enable_signup = false

[auth.email]
enable_signup = false
enable_confirmations = false
secure_password_change = true

[realtime]
enabled = true
